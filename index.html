<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Quote Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h1>Quote of the Day</h1>
        
        <!-- Loading Spinner -->
        <div id="loader" class="loader"></div>

        <!-- Error Message Container -->
        <div id="error-msg" class="error-msg" style="display: none;">
            Oops! Failed to load quote. Please try again.
        </div>

        <!-- Quote Content Container -->
        <div id="quote-container" class="quote-container" style="display: none;">
            <p id="quote-text" class="quote-text"></p>
            <p id="quote-author" class="quote-author"></p>
        </div>

        <button id="new-quote-btn">Get New Quote</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
